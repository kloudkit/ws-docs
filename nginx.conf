server {
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript text/markdown;

  listen 80;
  server_name _;
  index index.html;
  root /usr/share/nginx/html;

  error_page 404 /404.html;
  error_page 403 /404.html;

  location ~ \.md$ {
    default_type text/markdown;
    charset utf-8;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri.html $uri/ =404;

    location ~* ^/assets/ {
      expires 3d;
      add_header Cache-Control "public, immutable";
    }
  }
}
